name: aurora-media-player
base: core24
version: '0.1.1'
summary: Modern media player for GNOME
description: |
  Aurora Media Player is a modern, Haruna-inspired media player for GNOME.
  Built with GTK4, libadwaita, and mpv for high-quality playback.
  Supports video and audio in all common formats, YouTube, Twitch,
  IPTV/M3U playlists, subtitles, chapters, and MPRIS media-key integration.

grade: stable
confinement: strict
icon: data/icons/hicolor/scalable/apps/io.github.daniacosta_dev.AuroraMediaPlayer.svg

slots:
  # Allow MPRIS media-player integration (media keys, taskbar, lock screen).
  aurora-mpris:
    interface: mpris

apps:
  aurora-media-player:
    command: bin/aurora-media
    extensions: [gnome]
    slots:
      - aurora-mpris
    plugs:
      - audio-playback   # PipeWire / PulseAudio
      - home             # ~/Videos, ~/Music, ~/Downloads
      - removable-media  # USB drives, external disks
      - opengl           # GPU decoding (vaapi) + OpenGL render API
      - unity7           # Session D-Bus access for MPRIS
      - network          # HTTP/HTTPS streams and URL playback
    environment:
      # Prefer hardware-accelerated decoding; mpv falls back gracefully.
      LIBVA_DRIVER_NAME: ""
      # Make the bundled yt-dlp binary visible to mpv's ytdl_hook script.
      PATH: $SNAP/usr/bin:$PATH
      # libblas3/liblapack3 install into blas/ and lapack/ subdirectories
      # which are not on the default linker search path inside the snap.
      # gnome-platform is prepended before $LD_LIBRARY_PATH (which includes
      # gpu-2404) so its libharfbuzz takes priority over any older copy the
      # GPU content snap may bundle.
      LD_LIBRARY_PATH: $SNAP/gnome-platform/usr/lib/x86_64-linux-gnu:$SNAP/usr/lib/x86_64-linux-gnu/blas:$SNAP/usr/lib/x86_64-linux-gnu/lapack:$LD_LIBRARY_PATH

parts:
  aurora-media:
    plugin: rust
    source: .
    rust-channel: stable
    build-packages:
      - libmpv-dev
      - libepoxy-dev
      - librsvg2-bin    # rsvg-convert for PNG icon generation
      - pkg-config
    stage-packages:
      # mpv runtime library — not provided by the GNOME platform snap.
      - libmpv2
      # VA-API for hardware decoding on Intel/AMD.
      - libva2
      - libva-drm2
      - libva-x11-2
      # Mesa — needed for software GL fallback and vaapi on open drivers.
      - libgl1-mesa-dri
      # BLAS/LAPACK — pulled in by mpv audio processing.
      - libblas3
      - liblapack3
    # Exclude libraries already provided by the GNOME platform snap to avoid
    # version conflicts (libharfbuzz pulled in by libmpv2 dependencies).
    prime:
      - -usr/lib/x86_64-linux-gnu/libharfbuzz*
      - -usr/lib/x86_64-linux-gnu/libfreetype*
      - -usr/lib/x86_64-linux-gnu/libfontconfig*
    override-build: |
      craftctl default
      # Binary
      install -Dm755 target/release/aurora-media \
        "$CRAFT_PART_INSTALL/bin/aurora-media"
      # AppStream metainfo
      install -Dm644 data/io.github.daniacosta_dev.AuroraMediaPlayer.metainfo.xml \
        "$CRAFT_PART_INSTALL/share/metainfo/io.github.daniacosta_dev.AuroraMediaPlayer.metainfo.xml"
      # SVG icon (for icon-theme lookup)
      install -Dm644 data/icons/hicolor/scalable/apps/io.github.daniacosta_dev.AuroraMediaPlayer.svg \
        "$CRAFT_PART_INSTALL/share/icons/hicolor/scalable/apps/io.github.daniacosta_dev.AuroraMediaPlayer.svg"
      # PNG icon at meta/gui/icon.png — standard snap launcher icon
      mkdir -p "$CRAFT_PART_INSTALL/meta/gui"
      rsvg-convert -w 128 -h 128 \
        data/icons/hicolor/scalable/apps/io.github.daniacosta_dev.AuroraMediaPlayer.svg \
        -o "$CRAFT_PART_INSTALL/meta/gui/icon.png"

  yt-dlp:
    plugin: nil
    override-pull: |
      curl -fsSL \
        "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp" \
        -o "$CRAFT_PART_SRC/yt-dlp"
    override-build: |
      install -Dm755 "$CRAFT_PART_SRC/yt-dlp" "$CRAFT_PART_INSTALL/usr/bin/yt-dlp"
    build-packages:
      - curl
